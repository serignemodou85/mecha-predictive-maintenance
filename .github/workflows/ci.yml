name: MECHA - CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests unitaires & intégration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Préparation des données
        run: python src/data_preparation.py

      - name: Entraînement des modèles
        run: python src/model_training.py

      - name: Exécution des tests pytest
        run: |
          cd tests
          pytest test_mecha.py -v --tb=short

      - name: Upload rapport de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            docs/confusion_matrix.png
            docs/feature_importance.png
            docs/rul_prediction.png
            models/metrics.json

  build-docker:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t mecha-predictive-api:latest .

      - name: Test de l'image Docker (health check)
        run: |
          docker run -d -p 5000:5000 --name mecha-test mecha-predictive-api:latest
          sleep 5
          curl -f http://localhost:5000/health || (docker logs mecha-test && exit 1)
          docker stop mecha-test
